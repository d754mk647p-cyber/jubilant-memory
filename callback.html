<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OAuth Callback - Attendance Tracker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f1318;
      color: #fff;
    }
    .container {
      text-align: center;
    }
    .spinner {
      border: 4px solid #2d3748;
      border-top: 4px solid #4299e1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #cbd5e0;
      font-size: 16px;
    }
    .error {
      color: #fc8181;
    }
    .success {
      color: #9ae6b4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 id="title">Processing OAuth...</h1>
    <p id="message">Please wait while we complete your authentication.</p>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');

    // Extract token from URL hash
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    
    const accessToken = params.get('access_token');
    const error = params.get('error');
    const errorDescription = params.get('error_description');

    if (error) {
      // Handle OAuth error
      titleEl.textContent = 'Authentication Failed';
      titleEl.className = 'error';
      messageEl.textContent = errorDescription || 'An error occurred during authentication. Please try again.';
      messageEl.className = 'error';
      console.error('OAuth error:', error, errorDescription);
      
      // Redirect to main page after 3 seconds
      setTimeout(() => {
        window.location.href = '/';
      }, 3000);
    } else if (accessToken) {
      // Store token in localStorage
      localStorage.setItem('googleAccessToken', accessToken);
      localStorage.setItem('googleTokenTimestamp', Date.now());
      
      titleEl.textContent = 'Authentication Successful!';
      titleEl.className = 'success';
      messageEl.textContent = 'You have been authenticated. Redirecting to the app...';
      messageEl.className = 'success';
      
      console.log('OAuth token stored successfully');
      
      // Redirect to main page after 1.5 seconds
      setTimeout(() => {
        window.location.href = '/';
      }, 1500);
    } else {
      // No token or error
      titleEl.textContent = 'Authentication Incomplete';
      messageEl.textContent = 'No authentication data received. Please try again.';
      messageEl.className = 'error';
      
      // Redirect to main page after 3 seconds
      setTimeout(() => {
        window.location.href = '/';
      }, 3000);
    }
  </script>
</body>
</html>
